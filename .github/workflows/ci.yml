name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test -p stitch-sync --lib --test memory_store --test offline_queue --test persistence
      - run: cargo check -p stitch-sync --target wasm32-unknown-unknown
      - run: cargo clippy -p stitch-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings

  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"
      - run: echo "$CHROMEWEBDRIVER" >> "$GITHUB_PATH"
      - run: wasm-pack test --headless --chrome crates/stitch-wasm
        env:
          CHROMEDRIVER: ${{ env.CHROMEWEBDRIVER }}/chromedriver
