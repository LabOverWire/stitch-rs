name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build:
    runs-on: ubuntu-latest
    env:
      DEP_GIT_TOKEN: ${{ secrets.DEP_GIT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Authenticate git for private dependencies
        if: env.DEP_GIT_TOKEN != ''
        run: git config --global url."https://x-access-token:${DEP_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test -p stitch-sync --lib --test memory_store --test offline_queue --test persistence
      - run: cargo check -p stitch-sync --target wasm32-unknown-unknown
      - run: cargo clippy -p stitch-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings

  wasm-test:
    runs-on: ubuntu-latest
    env:
      DEP_GIT_TOKEN: ${{ secrets.DEP_GIT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Authenticate git for private dependencies
        if: env.DEP_GIT_TOKEN != ''
        run: git config --global url."https://x-access-token:${DEP_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          install-chromedriver: true
      - run: wasm-pack test --headless --chrome crates/stitch-wasm
        env:
          CHROMEDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}
