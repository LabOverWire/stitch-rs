name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Publish to crates.io (npm publish for stitch-wasm is done manually)
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches stitch-sync version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CRATE_VERSION=$(grep '^version' crates/stitch/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$CRATE_VERSION" ]; then
            echo "Tag v$TAG does not match stitch-sync version $CRATE_VERSION"
            exit 1
          fi

      - name: Publish stitch-sync
        run: cargo publish --package stitch-sync || echo "already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish stitch-wasm
        run: cargo publish --package stitch-wasm --no-verify || echo "already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
