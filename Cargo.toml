[package]
name = "stitch-p2p"
version = "0.1.0"
edition = "2024"

[dependencies]
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["sync", "io-util", "macros", "rt", "rt-multi-thread", "time", "net"] }

[dev-dependencies]
mqp2p = { path = "../mqp2p" }
quinn = { version = "0.11.9", default-features = false, features = ["rustls-ring", "runtime-tokio"] }
